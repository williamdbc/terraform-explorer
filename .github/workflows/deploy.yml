name: Terraform Explorer - Deploy

on:
  push:
    branches:
      - main
      - release/**

jobs:
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ['self-hosted', 'prod']
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparar envs PROD
        run: |
          mkdir -p infra/env

          cat > infra/env/api.env <<'EOF'
          ${{ secrets.API_ENV_PRD }}
          EOF

          cat > infra/env/web.env <<'EOF'
          ${{ secrets.WEB_ENV_PRD }}
          EOF

          # Junta tudo para o docker-compose usar
          cat infra/env/api.env infra/env/web.env > infra/env/compose.env

      - name: Preparar diretórios persistentes
        run: |
          set -a
          . infra/env/compose.env
          set +a

          mkdir -p "$DATA_DIR"
          mkdir -p "$WORKSPACE_DIR"

      - name: Subir containers PROD
        run: |
          docker compose \
            --env-file infra/env/compose.env \
            -f infra/docker-compose.yml \
            up -d --build --remove-orphans

  deploy-stg:
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ['self-hosted', 'stg']
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparar envs STG
        run: |
          mkdir -p infra/env

          cat > infra/env/api.env <<'EOF'
          ${{ secrets.API_ENV_STG }}
          EOF

          cat > infra/env/web.env <<'EOF'
          ${{ secrets.WEB_ENV_STG }}
          EOF

          # Junta tudo para o docker-compose usar
          cat infra/env/api.env infra/env/web.env > infra/env/compose.env

      - name: Preparar diretórios persistentes
        run: |
          set -a
          . infra/env/compose.env
          set +a

          mkdir -p "$DATA_DIR"
          mkdir -p "$WORKSPACE_DIR"

      - name: Subir containers STG
        run: |
          docker compose \
            --env-file infra/env/compose.env \
            -f infra/docker-compose.yml \
            up -d --build --remove-orphans
